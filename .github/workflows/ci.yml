name: Go CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
jobs:
  test:
    name: Run Tests 

    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
    
    - name: Install dependencies
      run: go mod download 

    - name: Run Unit Tests
      run: go test -v ./...